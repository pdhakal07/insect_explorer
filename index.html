<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!--
    iPad 11-inch (iPad Air 4/5, iPad Pro 11"):
    Portrait: 834 × 1194 pt  |  Landscape: 1194 × 834 pt
    viewport-fit=cover handles notch/safe-area on newer iPad Pro models
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Bio Lab Insects</title>
  <meta name="description" content="Interactive insect gallery for a university bio lab." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">🔬</span>
        <span class="brand-text">Interactive Insects Gallery</span>
      </div>
      <div class="topbar-actions">
        <a class="quiz-link" href="quiz.html" aria-label="Take the insect quiz">
          <span>Quiz</span>
          <span class="quiz-link-arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </header>

    <main class="gallery-wrap">
      <div id="insect-grid" class="insect-grid" aria-label="Interactive insect gallery"></div>
    </main>
  </div>

  <div id="sr-status" class="sr-only" aria-live="polite"></div>

  <script src="js/app.js"></script>
</body>
</html>
