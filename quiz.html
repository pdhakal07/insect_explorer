<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Insect Quiz — Bio Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="quiz-page">

    <!-- Topbar -->
    <header class="topbar" style="width: min(900px,100%); margin-top: 18px; flex-shrink: 0;">
      <div class="brand">
        <span class="brand-icon" aria-hidden="true">🔬</span>
        <span class="brand-text">Interactive Insects Gallery</span>
      </div>
      <div class="topbar-actions">
        <a class="back-link" href="index.html" aria-label="Back to gallery">← Gallery</a>
      </div>
    </header>

    <!-- Splash -->
    <div id="splash">
      <div class="splash-panel">
        <span class="emoji-big">🐛</span>
        <h1>Insect Quiz</h1>
        <p>Test your bug knowledge! You'll get <strong style="color:var(--accent)">8 random questions</strong> — each shows 4 insects to choose from. Pick the right one!</p>
        <button class="btn-start" id="btn-start-quiz">Start Quiz ✦</button>
      </div>
    </div>

    <!-- Active quiz -->
    <div id="quiz-area">
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <span class="progress-label" id="progress-label">1 / 8</span>
      </div>

      <div class="question-card" id="question-card"></div>

      <div class="quiz-controls">
        <button class="btn-ghost btn-abort" id="btn-abort">⊘ Abort</button>
        <div class="controls-divider" aria-hidden="true"></div>
        <button class="btn-ghost" id="btn-restart">↺ Restart</button>
      </div>
    </div>

    <!-- Results -->
    <div id="results">
      <div class="results-panel">
        <div class="score-circle" id="score-circle">
          <div class="score-circle-inner">
            <div class="score-number" id="score-number">0</div>
            <div class="score-total">out of 8</div>
          </div>
        </div>
        <h2 id="results-title">Quiz Complete!</h2>
        <p class="result-msg" id="results-msg"></p>
        <div class="results-actions">
          <button class="btn-start" id="btn-play-again">Play Again ↺</button>
          <a class="btn-ghost" href="index.html"
             style="text-decoration:none; min-height:44px; display:inline-flex; align-items:center; padding: 0 24px;">
            ← Gallery
          </a>
        </div>
      </div>
    </div>

  </div><!-- .quiz-page -->

  <!-- Abort confirmation modal -->
  <div id="abort-modal" role="dialog" aria-modal="true" aria-labelledby="abort-title">
    <div class="modal-box">
      <h3 id="abort-title">Quit the quiz?</h3>
      <p>Your progress will be lost. Are you sure you want to abort?</p>
      <div class="modal-actions">
        <button class="btn-ghost" id="btn-abort-cancel">Keep Playing</button>
        <button class="btn-danger" id="btn-abort-confirm">Yes, Quit</button>
      </div>
    </div>
  </div>

  <div id="sr-status" class="sr-only" aria-live="polite"></div>

  <script src="js/quiz.js"></script>
</body>
</html>
