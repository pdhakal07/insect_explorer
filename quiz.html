<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Insect Quiz — Bio Lab</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* ── Layout shell ──────────────────────────────────── */
    .quiz-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 14px 48px;
    }

    /* ── Splash ────────────────────────────────────────── */
    #splash {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .splash-panel {
      width: min(600px, 100%);
      padding: 48px 42px;
      border-radius: 32px;
      text-align: center;
      background: rgba(8, 25, 38, 0.88);
      border: 1px solid var(--line);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
      animation: fadeUp 0.5s ease both;
    }

    .splash-panel .emoji-big { font-size: 4rem; line-height: 1; margin-bottom: 18px; }

    .splash-panel h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 2.8rem);
      background: linear-gradient(135deg, var(--accent), #c3ffe0);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .splash-panel p { margin: 0 0 32px; color: var(--muted); font-size: 1.05rem; line-height: 1.7; }

    .btn-start {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 38px;
      border-radius: 999px;
      border: none;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      color: #07141d;
      background: linear-gradient(135deg, var(--accent), #c3ffe0);
      box-shadow: 0 14px 36px rgba(140, 241, 201, 0.25);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 20px 44px rgba(140, 241, 201, 0.32); }

    /* ── Active quiz area ──────────────────────────────── */
    #quiz-area {
      display: none;
      width: min(960px, 100%);
      margin-top: 30px;
      animation: fadeUp 0.4s ease both;
    }

    /* Progress bar */
    .progress-wrap { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }

    .progress-track {
      flex: 1;
      height: 7px;
      background: rgba(143, 194, 226, 0.12);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .progress-label {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── FIX 4 — Question card: better wrapping layout ── */
    .question-card {
      padding: 28px 32px 26px;
      border-radius: 28px;
      background: rgba(8, 25, 38, 0.88);
      border: 1px solid var(--line);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
      margin-bottom: 22px;
      animation: fadeUp 0.35s ease both;
    }

    .q-meta {
      display: flex;
      align-items: flex-start; /* top-align so badge doesn't stretch on long text */
      gap: 12px;
      margin-bottom: 20px;
    }

    .q-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #c3ffe0);
      color: #07141d;
      font-size: 0.82rem;
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 2px; /* optical alignment with first text line */
    }

    .q-text {
      margin: 0;
      font-size: clamp(1rem, 2vw, 1.18rem);
      font-weight: 600;
      color: var(--text);
      line-height: 1.55;
    }

    /* ── Image choices grid ────────────────────────────── */
    .choices-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .choice-btn {
      position: relative;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 0 14px;
      overflow: hidden;
      border-radius: 22px;
      border: 2px solid rgba(143, 194, 226, 0.14);
      background:
        radial-gradient(circle at 50% 40%, rgba(140, 241, 201, 0.06), transparent 50%),
        linear-gradient(180deg, rgba(12, 31, 47, 0.98), rgba(9, 21, 32, 0.98));
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      -webkit-user-select: none;
      user-select: none;
      isolation: isolate;
    }

    .choice-btn:hover:not(:disabled) {
      transform: translateY(-4px);
      border-color: var(--line-strong);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
    }

    .choice-btn:focus-visible {
      outline: 3px solid rgba(121, 215, 255, 0.5);
      outline-offset: 3px;
    }

    .choice-btn img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 14px 14px 42px;
      pointer-events: none;
      transition: transform 200ms ease, filter 200ms ease;
      filter: drop-shadow(0 10px 16px rgba(0, 0, 0, 0.3));
    }

    .choice-btn:hover:not(:disabled) img { transform: scale(1.06); }

    /* FIX 1 (quiz) — insect name label sits in its own gradient area */
    .choice-label {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 0 6px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 180ms ease;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .choice-btn:hover:not(:disabled) .choice-label { color: var(--text); }

    /* ── Feedback overlay ──────────────────────────────── */
    .feedback-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 5;
      padding: 12px;
    }

    .choice-btn.correct .feedback-overlay { background: rgba(14, 58, 34, 0.78); opacity: 1; }
    .choice-btn.wrong   .feedback-overlay { background: rgba(80, 12, 12, 0.78); opacity: 1; }

    .choice-btn.correct { border-color: rgba(140, 241, 201, 0.75); box-shadow: 0 0 0 1px rgba(140, 241, 201, 0.3), 0 18px 40px rgba(140, 241, 201, 0.18); }
    .choice-btn.wrong   { border-color: rgba(255, 80, 80, 0.65);   box-shadow: 0 0 0 1px rgba(255, 80, 80, 0.2),  0 18px 40px rgba(255, 60, 60, 0.14); }

    .choice-btn.dim { opacity: 0.32; }
    .choice-btn:disabled { cursor: default; }

    /* FIX 6 — Feedback icon + insect name label inside overlay */
    .feedback-icon {
      font-size: 2.4rem;
      line-height: 1;
      display: inline-block;
      animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .feedback-name {
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
      animation: fadeUp 0.3s ease 0.1s both;
      line-height: 1.3;
    }

    /* ── FIX 5 — Quiz controls: better spacing + min touch size ─ */
    .quiz-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 6px;
    }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 44px;          /* FIX 5: proper touch target */
      padding: 0 22px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: transparent;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      cursor: pointer;
      transition: color 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .btn-ghost:hover { color: var(--text); border-color: rgba(143, 194, 226, 0.45); background: rgba(255, 255, 255, 0.04); }

    .btn-abort { color: rgba(255, 100, 100, 0.7); border-color: rgba(255, 80, 80, 0.22); }
    .btn-abort:hover { color: #ff7070; border-color: rgba(255, 80, 80, 0.5); background: rgba(255, 60, 60, 0.06); }

    /* Divider between controls */
    .controls-divider {
      width: 1px;
      height: 20px;
      background: var(--line-strong);
      flex-shrink: 0;
    }

    /* ── Results ───────────────────────────────────────── */
    #results {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .results-panel {
      width: min(560px, 100%);
      padding: 48px 42px;
      border-radius: 32px;
      text-align: center;
      background: rgba(8, 25, 38, 0.88);
      border: 1px solid var(--line);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: var(--shadow);
      animation: fadeUp 0.5s ease both;
    }

    /* FIX 7 — Score circle: JS sets inline style directly, not CSS var */
    .score-circle {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      margin: 0 auto 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* JS will set .style.background directly */
      background: conic-gradient(var(--accent) 0deg, rgba(143, 194, 226, 0.1) 0deg);
      box-shadow: 0 0 0 6px rgba(8, 25, 38, 0.88), 0 0 0 8px rgba(140, 241, 201, 0.14);
    }

    .score-circle-inner {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: rgba(8, 25, 38, 0.98);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-number { font-size: 2rem; font-weight: 800; color: var(--accent); line-height: 1; }
    .score-total  { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.06em; }

    .results-panel h2   { margin: 0 0 8px; font-size: 1.6rem; }
    .result-msg         { margin: 0 0 32px; color: var(--muted); line-height: 1.7; }

    .results-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* ── Abort modal ───────────────────────────────────── */
    #abort-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(3, 10, 18, 0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #abort-modal.open { display: flex; }

    .modal-box {
      width: min(400px, calc(100% - 32px));
      padding: 36px 32px;
      border-radius: 28px;
      background: rgba(8, 25, 38, 0.96);
      border: 1px solid var(--line-strong);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
      text-align: center;
      animation: fadeUp 0.3s ease both;
    }

    .modal-box h3 { margin: 0 0 10px; font-size: 1.3rem; }
    .modal-box p  { margin: 0 0 28px; color: var(--muted); line-height: 1.6; }

    .modal-actions { display: flex; gap: 12px; justify-content: center; }

    .btn-danger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 26px;
      border-radius: 999px;
      border: none;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #ff5252, #ff8080);
      color: #fff;
      box-shadow: 0 8px 24px rgba(255, 80, 80, 0.28);
      transition: transform 160ms ease;
    }
    .btn-danger:hover { transform: translateY(-1px); }

    /* ── Animations ────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      0%   { transform: scale(0.5); opacity: 0; }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1);   opacity: 1; }
    }

    /* ── FIX 4 responsive — better wrapping on all widths ─ */

    /* Large tablet / small desktop: still 4-col but slightly tighter */
    @media (max-width: 900px) {
      .question-card { padding: 24px 24px 22px; }
      .choices-grid  { gap: 12px; }
    }

    /* 7-inch tablet portrait / large phone landscape: 2×2 grid */
    @media (max-width: 680px) {
      .choices-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .question-card { padding: 20px 16px 18px; }
      .q-text { font-size: 0.96rem; }
      .splash-panel, .results-panel { padding: 32px 22px; }
    }

    /* FIX 5 responsive — controls stack cleanly on very small screens */
    @media (max-width: 420px) {
      .quiz-controls { justify-content: space-between; }
      .controls-divider { display: none; }
      .btn-ghost { font-size: 0.8rem; padding: 0 16px; }
    }
  </style>
</head>
<body>
  <div class="quiz-page">

    <!-- Topbar -->
    <header class="topbar" style="width: min(960px,100%); margin-top: 18px; flex-shrink: 0;">
      <div class="brand">Interactive Insects Gallery</div>
      <div class="topbar-actions">
        <a class="back-link" href="index.html">← Gallery</a>
      </div>
    </header>

    <!-- Splash -->
    <div id="splash">
      <div class="splash-panel">
        <div class="emoji-big">🐛</div>
        <h1>Insect Quiz</h1>
        <p>Test your bug knowledge! You'll get <strong style="color:var(--accent)">8 random questions</strong> — each shows 4 insects to choose from. Pick the right one!</p>
        <button class="btn-start" id="btn-start-quiz">Start Game ✦</button>
      </div>
    </div>

    <!-- Active quiz -->
    <div id="quiz-area">
      <div class="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <span class="progress-label" id="progress-label">1 / 8</span>
      </div>

      <div class="question-card" id="question-card"></div>

      <!-- FIX 5: divider between abort and restart; both have min-height 44px -->
      <div class="quiz-controls">
        <button class="btn-ghost btn-abort" id="btn-abort">⊘ Abort</button>
        <div class="controls-divider" aria-hidden="true"></div>
        <button class="btn-ghost" id="btn-restart">↺ Restart</button>
      </div>
    </div>

    <!-- Results -->
    <div id="results">
      <div class="results-panel">
        <div class="score-circle" id="score-circle">
          <div class="score-circle-inner">
            <div class="score-number" id="score-number">0</div>
            <div class="score-total">out of 8</div>
          </div>
        </div>
        <h2 id="results-title">Quiz Complete!</h2>
        <p class="result-msg" id="results-msg"></p>
        <div class="results-actions">
          <button class="btn-start" id="btn-play-again">Play Again ↺</button>
          <a class="btn-ghost" href="index.html"
             style="text-decoration:none; min-height:44px; display:inline-flex; align-items:center;">
            ← Gallery
          </a>
        </div>
      </div>
    </div>

  </div><!-- .quiz-page -->

  <!-- Abort confirmation modal -->
  <div id="abort-modal" role="dialog" aria-modal="true" aria-labelledby="abort-title">
    <div class="modal-box">
      <h3 id="abort-title">Quit the quiz?</h3>
      <p>Your progress will be lost. Are you sure you want to abort?</p>
      <div class="modal-actions">
        <button class="btn-ghost" id="btn-abort-cancel">Keep Playing</button>
        <button class="btn-danger" id="btn-abort-confirm">Yes, Quit</button>
      </div>
    </div>
  </div>

  <div id="sr-status" class="sr-only" aria-live="polite"></div>

  <script src="js/insects.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
